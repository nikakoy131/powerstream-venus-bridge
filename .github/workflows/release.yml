name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags so `git describe` embeds the tag

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache PlatformIO + ESP-IDF toolchain
        uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build firmware
        run: pio run

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .pio/build/esp32-c6-devkitc-1/firmware.bin
            .pio/build/esp32-c6-devkitc-1/firmware.elf
          fail_on_unmatched_files: true
